<div class="w-full h-full">
  <div class="absolute left-0 top-0">
    <button (click)="type.set('normal')" class="bg-white">Normal</button>
    <button (click)="type.set('debug')" class="bg-white">Debug</button>
  </div>

  <canvas #canvas class="game" width="1920" height="1080" [class.hidden]="type() != 'normal'"></canvas>
  <canvas #canvas2 class="game" width="1920" height="1080" [class.hiddem]="type() != 'debug'"></canvas>
</div>
