<div class="flex gap-3 items-center">
  @if (fullscreenEnabled) {
    <button (click)="toggleFullscreen()" class="btn primary fullsc">
      <fa-icon [icon]="isFullscreen() ? faArrowsMinimize : faArrowsMaximize"></fa-icon>
    </button>
  }

  <button [routerLink]="''" class="btn primary">
    <fa-icon [icon]="faHome"></fa-icon>
  </button>

  <button (click)="togglePower()" class="btn" [class]="videoService.powerOn() ? 'success' : 'danger' ">
    <fa-icon [icon]="videoService.powerOn() ? faToggleOn : faToggleOff"></fa-icon>
  </button>

  @let anyDisconnected = connectionStates().some(c => !c);
  <button (click)="reconnect()" class="rounded-full px-3 py-1 text-white font-bold"
          [class]="anyDisconnected ? 'bg-red-500' : 'bg-green-500'">
    <small>
      {{ anyDisconnected ? 'Offline' : 'Online' }}
    </small>
  </button>
</div>
