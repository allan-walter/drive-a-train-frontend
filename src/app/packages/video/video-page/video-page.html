@let data = videoService.data();
@if (data.info != null && data.state != null) {
  <div class="h-full flex items-stretch relative">
    <div class="flex-9/12 relative">
      <!--    <div class="flex-12/12 relative">-->
      <app-birds-eye-video></app-birds-eye-video>
      <div class="absolute left-0 top-[200px]">
        <!--      <button class="btn btn-white" (click)={() => action('startup')}>Initial Run Sequence</button>-->
        <!--      <button class="btn btn-white" onclick={() => action('function')}>Function</button>-->
        <div class="bg-white text-black">
          forward: {{ data.forward }}
          <br>reverse: {{ data.reverse }}
        </div>
        <div class="bg-gray-800 text-white">
          Connection: {{ data.connection }}
          <div class="w-12 aspect-square {connectionColor()}"></div>
        </div>
      </div>
    </div>
    <!--    <div class="absolute top-0 right-0">-->
    <!--      <app-throttle-overlay></app-throttle-overlay>-->
    <!--    </div>-->
    <div class="flex-3/12 flex flex-col">
      <div class="flex-6/12">
        <app-throttle></app-throttle>
        <!--        <Units></Units>-->
      </div>
      <div class="flex-6/12">
        <!--        <app-pov-video></app-pov-video>-->
      </div>
    </div>
  </div>
} @else {
  Loading...
}
