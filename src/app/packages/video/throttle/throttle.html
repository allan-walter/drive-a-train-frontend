<div>
  <label>
    <input type="radio" [value]="'forward'" [formField]="throttleService.form.direction" />
    Forward
  </label>
  <label>
    <input type="radio" [value]="'reverse'" [formField]="throttleService.form.direction" />
    Reverse
  </label>
</div>

@if (throttleService.model().override) {
  <div class="bg-red-500">
    OVERRIDE ON
  </div>
}
<div>
  <input [formField]="throttleService.form.value" type="range" [step]="throttleService.step" />
</div>
